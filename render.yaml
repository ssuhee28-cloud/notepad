databases:
  - name: notepad-db
    plan: free
    databaseName: notepad
    user: notepad_user

services:
  - type: web
    name: notepad-app
    plan: free
    env: node
    region: singapore
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notepad-db
          property: connectionString
      - key: NODE_ENV
        value: production
